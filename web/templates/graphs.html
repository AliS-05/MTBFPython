<!DOCTYPE html>
<html>
<head>
	<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
	<title>MTBF Graphs</title>
	<style>
		.gallery { display: flex; flex-wrap: wrap; gap: 12px; }
		.gallery img { width: 300px; border: 1px solid #ccc; }
	</style>
</head>
<body>
	<nav>
		<ul>
			<li><a href="/">Home</a></li>
			<li><a href="/table3">Table 3</a></li>
			<li><a href="/table6">Table 6</a></li>
			<li><a href="/graphs">View Graphs</a></li>
		</ul>
	</nav>


	<h1>MTBF Graphs</h1>
	<div class="gallery">
		{% for fname in graphs %}
			<img src="{{ url_for('static', filename='graphs/' + fname) }}" alt="{{ fname }}">
		{% endfor %}
	</div>
</body>
</html>
