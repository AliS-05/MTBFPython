<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Dashboard</title>
	<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
	<nav>
		<ul>
			<li><a href="/table3">Table 3</a></li>
			<li><a href="/table6">Table 6</a></li>
			<li><a href="/graphs">View Graphs</a></li>
			<li><a href="/add">Add Data</a></li>
		</ul>
	</nav>

	<h1>Worst Performing SubSystems</h1>
	<br>
	{% for (subsystem, failureType), ratio in ratios %}
	<div class="landingEntries">
		<h2>Subystem: {{ subsystem }}, Failure Type: {{ failureType }} - Performing at {{ ratio * 100 }}% of Contractor Estimate</h2>
		<div class="landingImages">
				<img src="{{ url_for('static', filename='graphs/' ~ subsystem  ~ '.0_'~ failureType ~ '.png') }}">
		</div>
		{% endfor %}
	</div>

</body>
</html>
